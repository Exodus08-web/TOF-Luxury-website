<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Hair Collection | ToF Luxury</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com" rel="stylesheet">

<style>

:root {
  --gold: #d4af37;
  --champagne: #f7f3f0;
  --dark: #1a1a1a;
  --glass: rgba(255, 255, 255, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--champagne);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  padding: 0 8% 100px;
  -webkit-text-size-adjust: 100%;
}

/* MATURED PILL BUTTON */
.nav-header {
  padding: 50px 0 20px;
}

.back-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 28px;
  background: transparent;
  color: var(--dark);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 100px;
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
}

.back-pill svg {
  transition: transform 0.4s ease;
}

/* Hover State: Solid Black with Gold Text */
.back-pill:hover {
  background: var(--dark);
  color: var(--gold);
  border-color: var(--dark);
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.back-pill:hover svg {
  transform: translateX(-5px); /* Arrow moves inward */
}

@media (max-width: 768px) {
  .nav-header { padding: 30px 0; }
  .back-pill { padding: 10px 20px; font-size: 9px; }
}


h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 60px;
  text-align: center;
}

/* 3. MASONRY GRID */
.gallery {
  column-count: 3;
  column-gap: 25px;
}

.item {
  break-inside: avoid;
  margin-bottom: 25px;
  position: relative;
  background: white;
  padding: 12px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
}

.item.visible { opacity: 1; transform: translateY(0); }

.item img {
  width: 100%;
  display: block;
  transition: 0.8s ease;
}

/* 4. LIQUID GLASS OVERLAY */
.info-overlay {
  position: absolute;
  inset: 12px;
  background: rgba(26, 26, 26, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.4s ease;
  color: white;
  text-align: center;
  padding: 15px; /* Added internal padding */
  box-sizing: border-box;
}

.item:hover .info-overlay { opacity: 1; }

.info-overlay h3 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 1px;
  margin-bottom: 8px;
  font-size: clamp(14px, 4vw, 20px); 
  line-height: 1.3;
  width: 100%;
  padding: 0 10px;
  word-wrap: break-word; /* Forces long words to wrap */
  overflow-wrap: break-word;
}

.price { color: var(--gold); font-weight: 600; margin-bottom: 20px; }

/* 5. LIQUID GLASS BUTTON */
.order-btn {
  background: var(--glass);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 12px 25px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 40px;
  cursor: pointer;
  transition: 0.3s;
  -webkit-tap-highlight-color: transparent;
}

.order-btn:hover { background: white; color: var(--dark); }

/* 6. MOBILE FIXES */
@media (max-width: 768px) {
  body { padding: 0 5% 50px; }
  .gallery { column-count: 2; column-gap: 15px; }
  .item { padding: 8px; margin-bottom: 15px; }
  
  .info-overlay { inset: 8px; opacity: 0; pointer-events: auto !important;  }
  .item:active .info-overlay { opacity: 1; pointer-events: auto; }

.info-overlay h3 {
    font-size: 13px; 
    letter-spacing: 0px;
  }
  order-btn {
    padding: 8px 15px;
    font-size: 8px;
  }
}
</style>
</head>
<body>

<div class="nav-header">
  <a href="index.html" class="back-pill">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Return Home
  </a>
</div>


<h1>Human Hair Collection</h1>

<div class="gallery" id="hair-gallery">
  <!-- Items injected by JS -->
</div>

<script>
// ALL HAIR ITEMS ADDED HERE
const hairs = [
  {name: "10inches 5by5 bob colour 1b/brown", price: "₦55,000", img: "Hair 1.JPG"},
  {name: "22inches Burgundy bouncy hair with 5by5 closure", price: "₦175,000", img: "Hair 2.JPG"},
  {name: "14inches SDD Burgundy pixie curls with 5by5 closure, 200g", price: "₦175,000", img: "Hair 3.JPG"},
  {name: "30inches Full Frontal curly wig", price: "₦180,000", img: "Hair 4.JPG"},
  {name: "Flip bounce", price: "₦75,000", img: "Hair 5.JPG"},
  {name: "10iches vietnamese bonestraight with 2by4 closure", price: "₦100,000", img: "Hair 6.JPG"}
];

const gallery = document.getElementById('hair-gallery');

// Injecting the items automatically
hairs.forEach((hair, index) => {
  gallery.innerHTML += `
    <div class="item" style="transition-delay: ${index * 0.1}s">
      <img src="${hair.img}" alt="${hair.name}">
      <div class="info-overlay">
        <h3>${hair.name}</h3>
        <p class="price">${hair.price}</p>
        <button class="order-btn" onclick="order('${hair.name}')">Inquire via WhatsApp</button>
      </div>
    </div>
  `;
});

// Trigger entrance animation
window.addEventListener('load', () => {
  const items = document.querySelectorAll('.item');
  items.forEach(item => item.classList.add('visible'));
});

function order(name) {
  const phone = "2348139205497";
  const msg = encodeURIComponent("Hello ToF Luxury, I'm interested in this hair: " + name);
  
  // Official WhatsApp link format (Universal for iPhone, Android, and PC)
  const url = "https://wa.me/" + phone + "?text=" + msg;

  // Use location.href for PC compatibility
  // This is the "standard" way that doesn't trigger popup blockers
  window.location.href = url;
}


</script>

</body>
</html>
