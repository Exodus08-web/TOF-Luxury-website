<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footwear Collection | ToF Luxury</title>

<style>

@import url('https://googleapis.com');

:root {
  --gold: #d4af37;
  --champagne: #f7f3f0;
  --dark: #1a1a1a;
  --glass: rgba(255, 255, 255, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--champagne);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  padding: 0 8% 100px;
}


.nav-header {
  padding: 50px 0 20px;
}

.back-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 28px;
  background: transparent;
  color: var(--dark);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 100px;
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
}

.back-pill svg {
  transition: transform 0.4s ease;
}


.back-pill:hover {
  background: var(--dark);
  color: var(--gold);
  border-color: var(--dark);
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.back-pill:hover svg {
  transform: translateX(-5px); 
}

@media (max-width: 768px) {
  .nav-header { padding: 30px 0; }
  .back-pill { padding: 10px 20px; font-size: 9px; }
}


h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 60px;
  text-align: center;
}


.gallery {
  column-count: 3; 
  column-gap: 25px;
}

.item {
  break-inside: avoid; 
  margin-bottom: 25px;
  position: relative;
  background: white;
  padding: 12px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
}

.item.visible { opacity: 1; transform: translateY(0); }

.item img {
  width: 100%;
  display: block;
  transition: 0.8s var(--ease);
}


.info-overlay {
  position: absolute;
  inset: 12px; 
  background: rgba(26, 26, 26, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.4s ease;
  color: white;
  text-align: center;
  padding: 20px;
}

.item:hover .info-overlay { opacity: 1; }

.info-overlay h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.price { color: var(--gold); font-weight: 600; margin-bottom: 20px; }


.order-btn {
  background: var(--glass);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 12px 25px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 40px;
  cursor: pointer;
  transition: 0.3s;
}

.order-btn:hover { background: white; color: var(--dark); }


@media (max-width: 768px) {
  body { padding: 0 5% 50px; }
  .gallery { column-count: 2; column-gap: 15px; } 
  .item { padding: 8px; margin-bottom: 15px; }
  
  
  .info-overlay {
    inset: 8px;
    opacity: 0;
    pointer-events: none;
  }
  .item:active .info-overlay { opacity: 1; pointer-events: auto; }
}
</style>
</head>
<body>

<div class="nav-header">
  <a href="index.html" class="back-pill">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Return Home
  </a>
</div>


<h1>Footwear Collection</h1>

<div class="gallery" id="footwear-gallery">

      <img src="${shoe.img}" alt="${shoe.name}">
      <div class="info-overlay">
        <h3>${shoe.name}</h3>
        <p class="price">${shoe.price}</p>
        <button class="order-btn" onclick="order('${shoe.name}')">Order via WhatsApp</button>

});


window.addEventListener('load', () => {
  const items = document.querySelectorAll('.item');
  items.forEach(item => item.classList.add('visible'));
});

function order(name) {
  const phone = "2348139205497"; 
  const msg = encodeURIComponent(`Hello ToF Luxury, I'd like to order the footwear: ${name}.`);
  
  
  window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

</html>
