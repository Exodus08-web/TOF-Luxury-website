<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bag Collection | ToF Luxury</title>

<link href="https://googleapis.com" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --champagne: #f7f3f0;
  --dark: #1a1a1a;
  --glass: rgba(255, 255, 255, 0.8);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--champagne);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  padding: 0 8% 100px;
  animation: fadeIn 1.2s ease-out;
  -webkit-text-size-adjust: 100%;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }


.nav-header {
  padding: 50px 0 20px;
}

.back-pill {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 28px;
  background: transparent;
  color: var(--dark);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 100px;
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
}

.back-pill svg {
  transition: transform 0.4s ease;
}


.back-pill:hover {
  background: var(--dark);
  color: var(--gold);
  border-color: var(--dark);
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.back-pill:hover svg {
  transform: translateX(-5px); 
}

@media (max-width: 768px) {
  .nav-header { padding: 30px 0; }
  .back-pill { padding: 10px 20px; font-size: 9px; }
}


@media (max-width: 768px) {
  .back-btn {
    margin: 30px 0;
    font-size: 9px;
  }
}



h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 60px;
  text-align: center;
}


.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* Clean 3-column grid */
  gap: 40px;
  padding-bottom: 100px;
}

.item {
  position: relative;
  background: white;
  padding: 15px; 
  transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
}

.item img {
  width: 100%;
  aspect-ratio: 4/5; 
  object-fit: cover;
  display: block;
}

.item-overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(26, 26, 26, 0.8);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.4s;
  backdrop-filter: blur(5px);
}

.item:hover .item-overlay { opacity: 1; }

.item-overlay h3 {
  font-family: 'Playfair Display', serif;
  color: white;
  font-size: clamp(14px, 4vw, 20px); 
  letter-spacing: 1px;
  margin-bottom: 8px;
  width: 100%;
  padding: 0 10px;
  text-align: center;
  word-wrap: break-word; 
}

.item-overlay .price {
  color: var(--gold);
  letter-spacing: 1px;
  font-size: clamp(12px, 3vw, 14px);
  margin-bottom: 20px;
}

.order-btn {
  background: rgba(255, 255, 255, 0.2); 
  backdrop-filter: blur(10px);         
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4); 
  color: white;
  padding: 10px 20px;
  font-size: clamp(8px, 2.5vw, 10px);
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 40px;                
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.order-btn:hover {
  background: white;
  color: var(--dark);
  transform: scale(1.05);
}


@media (max-width: 768px) {
  body { padding: 0 5%; }
  .gallery { grid-template-columns: 1fr 1fr; gap: 15px; }
  .item { padding: 8px; }

  
  .item-overlay { 
    display: flex !important; 
    opacity: 0; 
    pointer-events: none; 
     padding: 15px; 
    box-sizing: border-box;
  }
  .item:active .item-overlay { 
    opacity: 1; 
  }

  .mobile-info { display: none; } 
}

.item {
  opacity: 0;
  transform: translateY(20px); 
  filter: blur(5px);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
}

.item.visible {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

@media (min-width: 769px) {
  .mobile-info { display: none; } 
}

.item {
  position: relative;
  background: white;
  padding: 15px;
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  filter: blur(10px);
  transition: all 1.2s cubic-bezier(0.2, 0, 0.2, 1); 
}


.item.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}


.image-container {
  overflow: hidden;
  position: relative;
}

.item img {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  display: block;
  transition: transform 2s var(--ease); 
}

.item:hover img {
  transform: scale(1.1);
}


.item:hover {
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  z-index: 10;
}


.back-btn span {
  display: inline-block;
  transition: transform 0.4s var(--ease);
}

.back-btn:hover span {
  transform: translateX(-8px) scale(1.2);
  color: var(--gold);
}

</style>
</head>

<body>

<div class="nav-header">
  <a href="index.html" class="back-pill">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Return Home
  </a>
</div>



<h1>The Bag Collection</h1>

<div class="gallery" id="gallery">
 
</div>

<script>
const bags = [
  {name:"Crossbody bag", price:"₦8500", img:"Bag 1.JPG"},
  {name:"Vintage lychee", price:"₦16,000", img:"Bags 5.JPG"},
  {name:"TS crossbody bag", price:"₦8,500", img:"Bag 3.JPG"},
  {name:"Biege Totebag", price:"₦9,000", img:"Bag 8.JPG"},
  {name:"Crosshatch minihandbag", price:"₦16,000", img:"Bag 10.JPG"},
  {name:"CrocSkin Leather handbag", price:"₦19,000", img:"Bag 18.JPG"},
  {name:"Shoulder Bag", price:"₦14,500", img:"Bag 14.JPG"},
  {name:"Ash retrostyle SB", price:"₦10,000", img:"Bags 6.JPG"},
  {name:"Crossbody Rhombus chain", price:"₦19,000", img:"Bag 2.JPG"},
  {name:"Leopard Skin", price:"₦9,500", img:"Bag 20.JPG"},
  {name:"Black retrostyle TB", price:"₦10,000", img:"Bag 7.JPG"},
  {name:"Back view", price:"₦10,000", img:"Bag 12.JPG"},
  {name:"Brown retro style TB", price:"₦10,000", img:"Bag 11.JPG"},
  {name:"Back view", price:"₦10,000", img:"Bag 9.JPG"},
  {name:"Embroidered TB", price:"₦9,000", img:"Bag 13.JPG"}
  ];

const gallery = document.getElementById('gallery');


bags.forEach((item, index) => {
 
  gallery.innerHTML += `
    <div class="item" style="transition-delay: ${index * 0.1}s">
      <div class="image-container">
        <img src="${item.img}" alt="${item.name}">
      </div>
      
      <div class="item-overlay">
        <h3>${item.name}</h3>
        <p class="price">${item.price}</p>
        <button class="order-btn" onclick="order('${item.name}', '${item.price}')">Inquire via WhatsApp</button>
      </div>

      <div class="mobile-info">
        <h3>${item.name}</h3>
        <p class="price">${item.price}</p>
        <button class="order-btn" onclick="order('${item.name}', '${item.price}')">Order Now</button>
      </div>
    </div>
  `;
});


function order(name, price) {
  const phone = "2348139205497"; 
  const cleanName = name.replace('<br/>', ' ');
  const msg = encodeURIComponent(`Hello ToF Luxury, I'm interested in the ${cleanName} which costs ${price}. Is this piece available?`);
  
  const url = `https://wa.me/${phone}?text=${msg}`;
  
  // Use window.location.href for better iOS compatibility
  window.location.href = url;
}

window.addEventListener('load', () => {
  const items = document.querySelectorAll('.item');
  items.forEach(item => {
    item.classList.add('visible');
  });
});



const backBtn = document.querySelector('.back-pill');
backBtn.addEventListener('mousemove', (e) => {
    const x = (e.pageX - backBtn.offsetLeft - backBtn.offsetWidth / 2) * 0.2;
    const y = (e.pageY - backBtn.offsetTop - backBtn.offsetHeight / 2) * 0.2;
    backBtn.style.transform = `translate(${x}px, ${y}px)`;
});
backBtn.addEventListener('mouseleave', () => {
    backBtn.style.transform = `translate(0, 0)`;
});



</script>


</body>
</html>
